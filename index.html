<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c1f;
      --border: #2a2a2f;
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --text: #e8e8ed;
      --muted: #7a7a8a;
      --tag-img: #1a3a2a;
      --tag-img-text: #4ade80;
      --tag-vid: #1a1a3a;
      --tag-vid-text: #818cf8;
      --tag-json: #2a1a1a;
      --tag-json-text: #fb923c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      padding: 72px 24px 56px;
      text-align: center;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, #3b2f8820 0%, transparent 70%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { margin-top: 12px; color: var(--muted); font-size: 1.05rem; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 28px 24px 0;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      max-width: 1280px;
      margin: 36px auto 80px;
      padding: 0 24px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: #4a4a5a; transform: translateY(-2px); }
    .card[data-hidden] { display: none; }

    .card-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
    .card-meta   { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .tag-img  { background: var(--tag-img);  color: var(--tag-img-text); }
    .tag-vid  { background: var(--tag-vid);  color: var(--tag-vid-text); }
    .tag-json { background: var(--tag-json); color: var(--tag-json-text); }

    .card-title { font-size: 1rem; font-weight: 600; line-height: 1.3; }
    .card-desc  { margin-top: 6px; font-size: 0.83rem; color: var(--muted); line-height: 1.55; }

    .inputs { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .input-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── VIDEO ── */
    .card-video {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #0a0a0c;
      display: flex;
      justify-content: center;
    }
    .card-video video {
      max-height: 240px;
      max-width: 100%;
      border-radius: 8px;
      display: block;
      object-fit: contain;
    }

    .code-wrap { flex: 1; background: #0a0a0c; }
    .code-scroll {
      max-height: 260px;
      overflow-y: auto;
      padding: 16px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .code-scroll::-webkit-scrollbar { width: 4px; }
    .code-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    pre {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      color: #c9c9d8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .18s;
    }
    .copy-btn:hover  { background: var(--accent); border-color: var(--accent); color: #fff; }
    .copy-btn.copied { background: #16a34a22; border-color: #16a34a; color: #4ade80; }
    .copy-btn svg { width: 14px; height: 14px; }

    .section-label {
      max-width: 1280px;
      margin: 0 auto;
      padding: 36px 24px 0;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Prompt Library</h1>
  <p>Coleção de prompts para geração e animação de imagens com avatar</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="filter('all', this)">Todos</button>
  <button class="tab" onclick="filter('img', this)">Imagem</button>
  <button class="tab" onclick="filter('vid', this)">Vídeo</button>
</div>

<div class="section-label" id="label-img">Imagem</div>
<div class="grid" id="grid-img"></div>

<div class="section-label" id="label-vid">Vídeo — Animações POV</div>
<div class="grid" id="grid-vid"></div>

<script>
  const TAG_MAP = {
    img:  ['tag-img',  'Imagem'],
    vid:  ['tag-vid',  'Vídeo'],
    json: ['tag-json', 'JSON'],
  };

  let activeFilter = 'all';

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderCard(p, id) {
    const pid = 'p' + id;
    const badges = p.tags.map(t => {
      const [cls, label] = TAG_MAP[t] || ['', t];
      return '<span class="tag ' + cls + '">' + label + '</span>';
    }).join(' ');

    const inputBadges = p.inputs.map(i => '<span class="input-badge">' + i + '</span>').join('\n');

    return `
    <div class="card" data-type="${p.type}">
      <div class="card-header">
        <div class="card-meta">${badges}</div>
        <div class="card-title">${p.title}</div>
        <div class="inputs">${inputBadges}</div>
      </div>
      ${p.video ? `<div class="card-video">
        <video src="${encodeURI(p.video)}" controls muted loop playsinline></video>
      </div>` : ''}
      <div class="code-wrap">
        <div class="code-scroll"><pre id="${pid}">${esc(p.body)}</pre></div>
      </div>
      <div class="card-footer">
        <button class="copy-btn" onclick="copyText('${pid}', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar
        </button>
      </div>
    </div>`;
  }

  function render(prompts) {
    const imgs = prompts.filter(p => p.type === 'img');
    const vids = prompts.filter(p => p.type === 'vid');

    document.getElementById('grid-img').innerHTML =
      imgs.map((p, i) => renderCard(p, i + 1)).join('');
    document.getElementById('grid-vid').innerHTML =
      vids.map((p, i) => renderCard(p, imgs.length + i + 1)).join('');

    applyFilter(activeFilter);
  }

  async function load() {
    const res     = await fetch('/api/prompts');
    const prompts = await res.json();
    render(prompts);
  }

  function filter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(type);
  }

  function applyFilter(type) {
    document.querySelectorAll('.card').forEach(card => {
      if (type !== 'all' && card.dataset.type !== type) {
        card.dataset.hidden = '1';
      } else {
        delete card.dataset.hidden;
      }
    });
    document.getElementById('label-img').style.display = type === 'vid' ? 'none' : '';
    document.getElementById('label-vid').style.display = type === 'img' ? 'none' : '';
  }

  function copyText(id, btn) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="20 6 9 17 4 12"/>
        </svg> Copiado!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg> Copiar`;
      }, 2000);
    });
  }

  // ── live reload via SSE ──────────────────────────────────────────────────────
  function connectSSE() {
    const es    = new EventSource('/sse');
    es.onmessage = (e) => { if (e.data === 'reload') load(); };
    es.onerror   = ()  => { setTimeout(connectSSE, 2000); };
  }

  document.addEventListener('mouseenter', e => {
    if (e.target.tagName === 'VIDEO') e.target.play().catch(() => {});
  }, true);
  document.addEventListener('mouseleave', e => {
    if (e.target.tagName === 'VIDEO') { e.target.pause(); e.target.currentTime = 0; }
  }, true);

  load();
  connectSSE();
</script>
</body>
</html>
